<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LOOTUN 루툰 | Brand Catalog</title>
    <meta
      name="description"
      content="LOOTUN 루툰 브랜드 상품 카탈로그. 카테고리별 상품을 둘러보고 상세 정보를 확인하세요."
    />
    <meta property="og:title" content="LOOTUN 루툰 | Brand Catalog" />
    <meta
      property="og:description"
      content="LOOTUN 루툰 브랜드 상품 카탈로그."
    />
    <meta property="og:image" content="assets/images/lootun-catalog-hero.png" />
    <link rel="stylesheet" href="styles.css?v=20260705-detail-refresh" />
  </head>
  <body>
    <header class="site-header" data-header>
      <a class="brand-mark" href="index.html" aria-label="LOOTUN 홈">
        <span class="brand-symbol">LT</span>
        <span>
          <strong>LOOTUN</strong>
          <small>루툰</small>
        </span>
      </a>
      <nav class="top-nav" aria-label="주요 메뉴">
        <a href="#catalog">Catalog</a>
        <a href="#contact">Contact</a>
      </nav>
    </header>

    <main>
      <section class="hero">
        <img
          class="hero-image"
          src="assets/images/lootun-catalog-hero.png"
          alt="LOOTUN 루툰 브랜드 패키지와 패브릭 제품 비주얼"
        />
        <div class="hero-scrim"></div>
        <div class="hero-content">
          <p class="eyebrow">BRAND PRODUCT CATALOG</p>
          <h1>LOOTUN 루툰</h1>
          <p>
            일상에서 오래 쓰이는 물건을 차분한 색감과 실용적인 구성으로
            제안하는 브랜드 카탈로그입니다.
          </p>
          <div class="hero-actions">
            <a class="button primary" href="#catalog">상품 보기</a>
            <a class="button ghost" href="#contact">문의하기</a>
          </div>
        </div>
      </section>

      <section class="catalog-shell" id="catalog" aria-labelledby="catalog-title">
        <div class="section-heading">
          <p class="eyebrow">CATALOG</p>
          <h2 id="catalog-title">카테고리별 상품</h2>
        </div>

        <div class="catalog-toolbar" aria-label="상품 탐색 도구">
          <label class="search-field">
            <span class="visually-hidden">상품 검색</span>
            <input
              type="search"
              id="product-search"
              placeholder="상품명, 카테고리, 태그 검색"
              autocomplete="off"
            />
          </label>
          <div class="category-tabs" id="category-tabs" aria-label="카테고리 필터"></div>
        </div>

        <div class="status-line" id="catalog-status" role="status" aria-live="polite"></div>
        <div class="category-stack" id="category-stack"></div>
      </section>

      <section class="contact-band" id="contact" aria-labelledby="contact-title">
        <div>
          <p class="eyebrow">CONTACT</p>
          <h2 id="contact-title">입점, 구매, 협업 문의</h2>
          <p>
            카탈로그의 상품명과 수량, 납기 일정을 함께 보내주시면 더 빠르게
            확인할 수 있습니다.
          </p>
        </div>
        <a class="button primary dark" href="mailto:hello@lootun.kr">hello@lootun.kr</a>
      </section>
    </main>

    <footer class="site-footer">
      <span>LOOTUN 루툰</span>
      <span>© <span id="year"></span> lootun-kr</span>
    </footer>

    <script src="script.js?v=20260705-detail-refresh"></script>
  </body>
</html>
